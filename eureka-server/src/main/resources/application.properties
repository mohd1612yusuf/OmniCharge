# ===================================================================
# EUREKA SERVER CONFIGURATION
# This service acts as a phonebook for all other microservices.
# ===================================================================

# The server port on which Eureka runs. Default is 8761.
server.port=8761

# The name of the application.
spring.application.name=eureka-server

# Configuration for the Eureka Instance.
eureka.instance.hostname=localhost

# A Eureka server doesn't need to register with itself.
eureka.client.register-with-eureka=false
# A Eureka server doesn't need to fetch the registry from itself.
eureka.client.fetch-registry=false

# The URL where clients will connect to this Eureka server.
eureka.client.service-url.defaultZone=http://${eureka.instance.hostname}:${server.port}/eureka/
