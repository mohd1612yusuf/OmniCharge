version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: OmniCharge
    ports:
      - "5432:5432"
    networks:
      - omnicharge-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"      # AMQP protocol port
      - "15672:15672"    # HTTP management UI
    networks:
      - omnicharge-network

networks:
  omnicharge-network:
    driver: bridge

volumes:
  postgres-data:
